<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    
    <linearGradient id="purpleBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Card 1: Polla Mundialista -->
  <g transform="translate(0, 0)">
    <rect width="280" height="200" fill="url(#cardGrad)" rx="12"/>
    <rect x="1" y="1" width="278" height="198" fill="none" stroke="url(#purpleBorder)" stroke-width="1" rx="12" opacity="0.4"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="60" fill="#7c3aed" opacity="0.1" rx="12"/>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" filter="url(#glow)">⚽ Polla Mundialista</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#a855f7">🏆 FIFA World Cup 2026</text>
    
    <!-- Description -->
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Plataforma de quiniela para el mundial</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">con sistema de puntos y premios.</text>
    
    <!-- Tech badges -->
    <rect x="20" y="115" width="50" height="18" fill="#000000" rx="4"/>
    <text x="45" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Next.js</text>
    
    <rect x="75" y="115" width="55" height="18" fill="#235a97" rx="4"/>
    <text x="102" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">TypeScript</text>
    
    <rect x="135" y="115" width="55" height="18" fill="#336791" rx="4"/>
    <text x="162" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">PostgreSQL</text>
    
    <!-- Stats -->
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="10" fill="#ffd43b">⭐ 27</text>
    <text x="80" y="160" font-family="Arial, sans-serif" font-size="10" fill="#888888">🍴 Fork 8</text>
    
    <!-- Link -->
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" filter="url(#glow)">Ver proyecto →</text>
  </g>
  
  <!-- Card 2: Reconocimiento de Placa -->
  <g transform="translate(310, 0)">
    <rect width="280" height="200" fill="url(#cardGrad)" rx="12"/>
    <rect x="1" y="1" width="278" height="198" fill="none" stroke="url(#purpleBorder)" stroke-width="1" rx="12" opacity="0.4"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="60" fill="#00d4ff" opacity="0.1" rx="12"/>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" filter="url(#glow)">🔍 Reconocimiento de Placa</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff">🤖 AI / Computer Vision</text>
    
    <!-- Description -->
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Sistema de reconocimiento de placas</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">vehiculares con IA en tiempo real.</text>
    
    <!-- Tech badges -->
    <rect x="20" y="115" width="50" height="18" fill="#306998" rx="4"/>
    <text x="45" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffd43b" text-anchor="middle">Python</text>
    
    <rect x="75" y="115" width="45" height="18" fill="#ff6f00" rx="4"/>
    <text x="97" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">YOLO</text>
    
    <rect x="125" y="115" width="50" height="18" fill="#5c3eef" rx="4"/>
    <text x="150" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">OpenCV</text>
    
    <!-- Stats -->
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="10" fill="#ffd43b">⭐ 42</text>
    <text x="80" y="160" font-family="Arial, sans-serif" font-size="10" fill="#888888">🍴 Fork 12</text>
    
    <!-- Link -->
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" filter="url(#glow)">Ver proyecto →</text>
  </g>
  
  <!-- Card 3: MOVIFLEXX -->
  <g transform="translate(620, 0)">
    <rect width="280" height="200" fill="url(#cardGrad)" rx="12"/>
    <rect x="1" y="1" width="278" height="198" fill="none" stroke="url(#purpleBorder)" stroke-width="1" rx="12" opacity="0.4"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="60" fill="#3ddc84" opacity="0.1" rx="12"/>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" filter="url(#glow)">🚀 MOVIFLEXX</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#3ddc84">📱 Android / Mobile</text>
    
    <!-- Description -->
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Aplicacion movil nativa para soluciones</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">de movilidad urbana moderna.</text>
    
    <!-- Tech badges -->
    <rect x="20" y="115" width="45" height="18" fill="#7f52ff" rx="4"/>
    <text x="42" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Kotlin</text>
    
    <rect x="70" y="115" width="55" height="18" fill="#3ddc84" rx="4"/>
    <text x="97" y="128" font-family="Arial, sans-serif" font-size="8" fill="#000000" text-anchor="middle">Android</text>
    
    <rect x="130" y="115" width="50" height="18" fill="#02303a" rx="4"/>
    <text x="155" y="128" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Gradle</text>
    
    <!-- Stats -->
    <text x="20" y="160" font-family="Arial, sans-serif" font-size="10" fill="#ffd43b">⭐ 35</text>
    <text x="80" y="160" font-family="Arial, sans-serif" font-size="10" fill="#888888">🍴 Fork 15</text>
    
    <!-- Link -->
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" filter="url(#glow)">Ver proyecto →</text>
  </g>
</svg>
