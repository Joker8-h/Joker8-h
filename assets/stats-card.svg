<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="400" height="200" fill="url(#cardGrad)" rx="15"/>
  
  <!-- Border glow -->
  <rect x="1" y="1" width="398" height="198" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" rx="15" opacity="0.4"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle" filter="url(#glow)">
    📊 GITHUB STATS
  </text>
  
  <!-- Stats grid -->
  <!-- Stars -->
  <g transform="translate(30, 50)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#888888">⭐ Total Stars</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">152</text>
  </g>
  
  <!-- Commits -->
  <g transform="translate(150, 50)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#888888">📦 Total Commits</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">1.3k</text>
  </g>
  
  <!-- PRs -->
  <g transform="translate(270, 50)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#888888">🔀 Total PRs</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">45</text>
  </g>
  
  <!-- Divider -->
  <line x1="30" y1="110" x2="370" y2="110" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Issues -->
  <g transform="translate(30, 125)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#888888">🐛 Total Issues</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" filter="url(#glow)">18</text>
  </g>
  
  <!-- Contributed to -->
  <g transform="translate(150, 125)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#888888">🤝 Contributed to</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" filter="url(#glow)">12</text>
  </g>
  
  <!-- Grade circle -->
  <g transform="translate(300, 120)">
    <circle cx="50" cy="35" r="40" fill="none" stroke="url(#purpleGrad)" stroke-width="3" opacity="0.3"/>
    <circle cx="50" cy="35" r="40" fill="none" stroke="url(#cyanGrad)" stroke-width="3" 
            stroke-dasharray="251" stroke-dashoffset="25" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 50 35" to="360 50 35" dur="10s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">A+</text>
  </g>
</svg>
