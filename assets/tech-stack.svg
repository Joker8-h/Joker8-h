<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="#0d1117" rx="10"/>
  
  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="118" fill="none" stroke="#7c3aed" stroke-width="1" rx="10" opacity="0.3"/>
  
  <!-- Section title -->
  <text x="400" y="25" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle" filter="url(#glow)">
    🛠️ TECH STACK
  </text>
  
  <!-- Tech icons row 1 -->
  <g transform="translate(50, 50)">
    <!-- React -->
    <circle cx="20" cy="20" r="18" fill="#20232a" stroke="#61dafb" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#61dafb" text-anchor="middle" filter="url(#glow)">R</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">React</text>
  </g>
  
  <g transform="translate(110, 50)">
    <!-- Next.js -->
    <circle cx="20" cy="20" r="18" fill="#000000" stroke="#ffffff" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">N</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Next.js</text>
  </g>
  
  <g transform="translate(170, 50)">
    <!-- TypeScript -->
    <circle cx="20" cy="20" r="18" fill="#235a97" stroke="#3178c6" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">TS</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">TypeScript</text>
  </g>
  
  <g transform="translate(230, 50)">
    <!-- Node.js -->
    <circle cx="20" cy="20" r="18" fill="#026e00" stroke="#339933" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">N</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Node.js</text>
  </g>
  
  <g transform="translate(290, 50)">
    <!-- Python -->
    <circle cx="20" cy="20" r="18" fill="#306998" stroke="#ffd43b" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffd43b" text-anchor="middle" filter="url(#glow)">Py</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Python</text>
  </g>
  
  <g transform="translate(350, 50)">
    <!-- Kotlin -->
    <circle cx="20" cy="20" r="18" fill="#7f52ff" stroke="#a97bff" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">K</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Kotlin</text>
  </g>
  
  <g transform="translate(410, 50)">
    <!-- Docker -->
    <circle cx="20" cy="20" r="18" fill="#2496ed" stroke="#0db7ed" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">D</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Docker</text>
  </g>
  
  <g transform="translate(470, 50)">
    <!-- PostgreSQL -->
    <circle cx="20" cy="20" r="18" fill="#336791" stroke="#4169e1" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">PG</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">PostgreSQL</text>
  </g>
  
  <g transform="translate(530, 50)">
    <!-- MongoDB -->
    <circle cx="20" cy="20" r="18" fill="#47a248" stroke="#3fa037" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">M</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">MongoDB</text>
  </g>
  
  <g transform="translate(590, 50)">
    <!-- Git -->
    <circle cx="20" cy="20" r="18" fill="#f05032" stroke="#de4c36" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">G</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Git</text>
  </g>
  
  <g transform="translate(650, 50)">
    <!-- AI/ML -->
    <circle cx="20" cy="20" r="18" fill="#ff6f00" stroke="#ffab40" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">AI</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">AI/ML</text>
  </g>
  
  <g transform="translate(710, 50)">
    <!-- Tailwind -->
    <circle cx="20" cy="20" r="18" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle" filter="url(#glow)">T</text>
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="8" fill="#888888" text-anchor="middle">Tailwind</text>
  </g>
</svg>
