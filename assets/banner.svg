<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Space gradient background -->
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    
    <!-- Neon purple glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Cyan glow -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star twinkle animation -->
    <radialGradient id="starGlow">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#spaceGrad)"/>
  
  <!-- Animated stars -->
  <circle cx="50" cy="30" r="1.5" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="60" r="1" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="20" r="1.2" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="0.8" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="40" r="1.3" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="70" r="1" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="25" r="1.4" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="55" r="0.9" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="35" r="1.1" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="120" r="0.7" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="1.2" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="180" r="0.9" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="200" r="1.1" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="160" r="0.8" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="190" r="1.3" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="140" r="1" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="170" r="0.7" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Decorative line top -->
  <line x1="100" y1="60" x2="800" y2="60" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Decorative line bottom -->
  <line x1="100" y1="240" x2="800" y2="240" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Purple orb left -->
  <circle cx="150" cy="150" r="80" fill="#7c3aed" opacity="0.05">
    <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Cyan orb right -->
  <circle cx="750" cy="150" r="70" fill="#00d4ff" opacity="0.05">
    <animate attributeName="r" values="70;80;70" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Greeting text -->
  <text x="450" y="110" font-family="Arial, sans-serif" font-size="18" fill="#a855f7" text-anchor="middle" filter="url(#subtleGlow)">
    Hey there! 👋 I'm
  </text>

  <!-- Main name with neon glow -->
  <text x="450" y="160" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#neonGlow)">
    Arlys Alfonso
  </text>
  
  <!-- Subtitle with cyan glow -->
  <text x="450" y="195" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" text-anchor="middle" filter="url(#cyanGlow)">
    Full Stack Developer | AI Enthusiast | DevOps
  </text>
  
  <!-- Tech keywords -->
  <text x="450" y="225" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle">
    React • Next.js • Python • Docker • AI/ML • PostgreSQL
  </text>
  
  <!-- Animated accent line -->
  <line x1="300" y1="250" x2="600" y2="250" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x1" values="300;350;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;550;600" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
</svg>
