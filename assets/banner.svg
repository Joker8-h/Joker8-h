<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#bgGrad)" rx="8"/>

  <!-- Geometric decorative elements -->
  <rect x="80" y="40" width="1" height="200" fill="#7c3aed" opacity="0.15"/>
  <rect x="820" y="40" width="1" height="200" fill="#00d4ff" opacity="0.15"/>
  
  <circle cx="850" cy="50" r="3" fill="#7c3aed" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="230" r="2" fill="#00d4ff" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.05;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid dots -->
  <g opacity="0.04">
    <circle cx="100" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="150" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="200" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="100" cy="120" r="1" fill="#7c3aed"/>
    <circle cx="150" cy="120" r="1" fill="#7c3aed"/>
    <circle cx="200" cy="120" r="1" fill="#7c3aed"/>
    <circle cx="700" cy="160" r="1" fill="#00d4ff"/>
    <circle cx="750" cy="160" r="1" fill="#00d4ff"/>
    <circle cx="800" cy="160" r="1" fill="#00d4ff"/>
    <circle cx="700" cy="200" r="1" fill="#00d4ff"/>
    <circle cx="750" cy="200" r="1" fill="#00d4ff"/>
    <circle cx="800" cy="200" r="1" fill="#00d4ff"/>
  </g>

  <!-- Small decorative dot grid -->
  <g opacity="0.03">
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff"/>
    </pattern>
    <rect x="0" y="0" width="900" height="280" fill="url(#dotGrid)"/>
  </g>

  <!-- Greeting -->
  <text x="450" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#7c3aed" text-anchor="middle" letter-spacing="3" filter="url(#glowSoft)">HELLO, I'M</text>

  <!-- Name -->
  <text x="450" y="145" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="1">Arlys Alfonso Pertuz</text>

  <!-- Role tags -->
  <rect x="250" y="170" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.15"/>
  <text x="315" y="187" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#a78bfa" text-anchor="middle">Full Stack Developer</text>

  <rect x="385" y="170" width="130" height="26" rx="13" fill="#00d4ff" opacity="0.1"/>
  <text x="450" y="187" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#67e8f9" text-anchor="middle">AI / ML Engineer</text>

  <rect x="520" y="170" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.15"/>
  <text x="585" y="187" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#a78bfa" text-anchor="middle">DevOps</text>

  <!-- Accent line -->
  <line x1="200" y1="225" x2="700" y2="225" stroke="url(#accentLine)" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom decorative dots -->
  <circle cx="250" cy="248" r="2" fill="#7c3aed" opacity="0.2"/>
  <circle cx="450" cy="248" r="2" fill="#00d4ff" opacity="0.2"/>
  <circle cx="650" cy="248" r="2" fill="#7c3aed" opacity="0.2"/>
</svg>