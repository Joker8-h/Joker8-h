<svg width="854" height="120" viewBox="0 0 854 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="854" height="120" fill="url(#bg)" rx="6"/>

  <!-- Quote marks -->
  <text x="60" y="55" font-family="Georgia,serif" font-size="60" fill="#7c3aed" opacity="0.4">"</text>

  <!-- Quote text -->
  <text x="100" y="60" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-style="italic" fill="#e6edf3" filter="url(#glow)">
    La mejor manera de predecir el futuro es creándolo.
  </text>

  <!-- Author -->
  <text x="100" y="85" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#00d4ff" filter="url(#glow)">— Peter Drucker</text>

  <!-- Closing quote -->
  <text x="790" y="80" font-family="Georgia,serif" font-size="60" fill="#7c3aed" opacity="0.4">"</text>

  <!-- Accent line -->
  <line x1="100" y1="95" x2="754" y2="95" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>

  <!-- Decorative elements -->
  <circle cx="820" cy="20" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="835" cy="40" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="825" cy="100" r="1" fill="#00d4ff" opacity="0.2"/>
</svg>