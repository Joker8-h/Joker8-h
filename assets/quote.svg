<svg width="854" height="100" viewBox="0 0 854 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="854" height="100" fill="url(#bgGrad)" rx="8"/>

  <!-- Large decorative quote mark -->
  <text x="45" y="65" font-family="Georgia, serif" font-size="64" fill="#7c3aed" opacity="0.15">"</text>

  <!-- Quote text -->
  <text x="80" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-style="italic" fill="#d1d5db">
    La mejor manera de predecir el futuro es creándolo.
  </text>

  <!-- Author -->
  <text x="80" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#00d4ff" font-weight="500">Peter Drucker</text>

  <!-- Decorative line -->
  <line x1="200" y1="82" x2="654" y2="82" stroke="url(#lineGrad)" stroke-width="1"/>
</svg>