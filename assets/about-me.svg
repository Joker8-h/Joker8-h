<svg width="854" height="180" viewBox="0 0 854 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="854" height="180" fill="url(#bgGrad)" rx="8"/>

  <!-- Card 1: AI Applications -->
  <rect x="20" y="15" width="260" height="150" rx="8" fill="url(#cardGrad1)" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <circle cx="50" cy="45" r="14" fill="#7c3aed" opacity="0.15"/>
  <text x="50" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">🤖</text>
  
  <text x="75" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e7ff">AI-Powered Apps</text>
  
  <text x="36" y="78" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Real-time computer vision</text>
  <text x="36" y="96" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Intelligent detection systems</text>
  <text x="36" y="114" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">ML model deployment</text>

  <!-- Card 2: Full Stack -->
  <rect x="297" y="15" width="260" height="150" rx="8" fill="url(#cardGrad2)" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <circle cx="327" cy="45" r="14" fill="#00d4ff" opacity="0.15"/>
  <text x="327" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#67e8f9" text-anchor="middle">💻</text>
  
  <text x="352" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e7ff">Full Stack Platforms</text>
  
  <text x="313" y="78" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">End-to-end web solutions</text>
  <text x="313" y="96" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Modern frameworks (React, Node)</text>
  <text x="313" y="114" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Scalable architecture</text>

  <!-- Card 3: DevOps -->
  <rect x="574" y="15" width="260" height="150" rx="8" fill="url(#cardGrad3)" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <circle cx="604" cy="45" r="14" fill="#7c3aed" opacity="0.15"/>
  <text x="604" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">⚙️</text>
  
  <text x="629" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e7ff">DevOps Automation</text>
  
  <text x="590" y="78" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">CI/CD pipelines</text>
  <text x="590" y="96" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Docker &amp; containerization</text>
  <text x="590" y="114" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#9ca3af">Cloud infrastructure</text>
</svg>