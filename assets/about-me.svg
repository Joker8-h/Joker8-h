<svg width="854" height="200" viewBox="0 0 854 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="854" height="200" fill="url(#bg)" rx="6"/>

  <!-- Accent line top -->
  <line x1="50" y1="25" x2="804" y2="25" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- Item 1: AI-Powered Applications -->
  <circle cx="70" cy="60" r="5" fill="#00d4ff" filter="url(#glow)"/>
  <text x="85" y="64" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#00d4ff" filter="url(#glow)">AI-Powered Applications</text>
  <text x="85" y="82" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e">Computer vision systems with real-time detection</text>

  <!-- Item 2: Full Stack Platforms -->
  <circle cx="70" cy="110" r="5" fill="#7c3aed" filter="url(#glow)"/>
  <text x="85" y="114" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#7c3aed" filter="url(#glow)">Full Stack Platforms</text>
  <text x="85" y="132" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e">End-to-end web solutions with modern frameworks</text>

  <!-- Item 3: DevOps Automation -->
  <circle cx="70" cy="160" r="5" fill="#00d4ff" filter="url(#glow)"/>
  <text x="85" y="164" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#00d4ff" filter="url(#glow)">DevOps Automation</text>
  <text x="85" y="182" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#8b949e">CI/CD pipelines and containerized deployments</text>

  <!-- Accent line bottom -->
  <line x1="50" y1="195" x2="804" y2="195" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- Decorative dots -->
  <circle cx="820" cy="30" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="835" cy="50" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="825" cy="70" r="1" fill="#00d4ff" opacity="0.2"/>
  <circle cx="840" cy="140" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="830" cy="160" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="845" cy="180" r="1" fill="#7c3aed" opacity="0.2"/>
</svg>