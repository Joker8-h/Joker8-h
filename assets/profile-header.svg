<svg width="854" height="320" viewBox="0 0 854 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="25%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="75%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="427" cy="100" r="45"/>
    </clipPath>
    <filter id="avatarGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cover background -->
  <rect width="854" height="200" fill="url(#coverGrad)" rx="8"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff"/>
    </pattern>
    <rect x="0" y="0" width="854" height="200" fill="url(#dotGrid)"/>
  </g>

  <!-- Avatar circle border glow -->
  <circle cx="427" cy="100" r="49" fill="none" stroke="url(#accentLine)" stroke-width="2" filter="url(#avatarGlow)"/>
  
  <!-- Avatar background placeholder -->
  <circle cx="427" cy="100" r="45" fill="#111827"/>
  <circle cx="427" cy="100" r="45" fill="#7c3aed" opacity="0.2"/>
  
  <!-- Avatar initials -->
  <text x="427" y="115" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#a78bfa" text-anchor="middle">AP</text>

  <!-- Name -->
  <text x="427" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Arlys Alfonso Pertuz</text>
  
  <!-- Username -->
  <text x="427" y="190" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle">@Joker8-h</text>

  <!-- Title -->
  <text x="427" y="210" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Full Stack Developer  •  AI / ML  •  DevOps</text>

  <!-- Separator line -->
  <line x1="50" y1="225" x2="804" y2="225" stroke="url(#accentLine)" stroke-width="1"/>

  <!-- Stats section -->
  <g>
    <!-- Stars -->
    <text x="200" y="252" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#a78bfa" text-anchor="middle">152</text>
    <text x="200" y="270" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Stars</text>

    <!-- Commits -->
    <text x="427" y="252" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#67e8f9" text-anchor="middle">1.3k</text>
    <text x="427" y="270" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Commits</text>

    <!-- PRs -->
    <text x="654" y="252" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#a78bfa" text-anchor="middle">45</text>
    <text x="654" y="270" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Pull Requests</text>
  </g>

  <!-- Tech badges / Highlights (Instagram-style) -->
  <g>
    <circle cx="200" cy="300" r="12" fill="#7c3aed" opacity="0.15"/>
    <text x="200" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">⚛</text>
    <text x="200" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">React</text>

    <circle cx="260" cy="300" r="12" fill="#00d4ff" opacity="0.1"/>
    <text x="260" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">⬡</text>
    <text x="260" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Node</text>

    <circle cx="320" cy="300" r="12" fill="#7c3aed" opacity="0.15"/>
    <text x="320" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">🐍</text>
    <text x="320" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Python</text>

    <circle cx="380" cy="300" r="12" fill="#00d4ff" opacity="0.1"/>
    <text x="380" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">🐳</text>
    <text x="380" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Docker</text>

    <circle cx="440" cy="300" r="12" fill="#7c3aed" opacity="0.15"/>
    <text x="440" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">☁</text>
    <text x="440" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">AWS</text>

    <circle cx="500" cy="300" r="12" fill="#00d4ff" opacity="0.1"/>
    <text x="500" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">🗄</text>
    <text x="500" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">SQL</text>

    <circle cx="560" cy="300" r="12" fill="#7c3aed" opacity="0.15"/>
    <text x="560" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">🔄</text>
    <text x="560" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Git</text>

    <circle cx="620" cy="300" r="12" fill="#00d4ff" opacity="0.1"/>
    <text x="620" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">🎯</text>
    <text x="620" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">TypeScript</text>

    <circle cx="680" cy="300" r="12" fill="#7c3aed" opacity="0.15"/>
    <text x="680" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">🔷</text>
    <text x="680" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Mongo</text>
  </g>
</svg>