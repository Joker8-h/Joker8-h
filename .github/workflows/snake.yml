name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Joker8-h
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=orange&color_dots=%2300d4ff,%2300d4ff,%2300d4ff,%237c3aed,%237c3aed

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
